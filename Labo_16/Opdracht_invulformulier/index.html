<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form>
    <label for="first-name">Voornaam*:</label>
    <input type="text" id="first-name" name="first-name" placeholder="Your first name" required autofocus /><br />

    <label for="last-name">Achternaam*:</label>
    <input type="text" id="last-name" name="last-name" placeholder="Your last name" required /><br />

    <p>Welke sport beoefen je?</p>
    <input type="checkbox" id="running" name="sport" value="Running" />
    <label for="running">Running</label><br />

    <input type="checkbox" id="swimming" name="sport" value="Swimming" />
    <label for="swimming">Swimming</label><br />

    <input type="checkbox" id="rowing" name="sport" value="Rowing" />
    <label for="rowing">Rowing</label><br />
    <br/>
    <p>Hoe kunnen we je bereiken?</p>
    <input type="radio" id="communicatie" name="communicatie" value="Per post" />
    <label for="communicatie">Per post</label><br />
    <input type="radio" id="communicatie2" name="communicatie" value="E-mail" />
    <label for="communicatie2">E-mail</label><br />
    <br/>
    <label for="favoriete-film">favoriet film:</label>
    <input type="text" id="favoriete-film" name="favoriete-film" />
    <br/>
    <label for="Favoriete-qoute">Favoriete qoute: </label>
    <input type="text" id="Favoriete-qoute" name="Favoriete-qoute" />
    <br/>
    <label for="eten">Favoriete eten:</label>
    <select id="eten" name="eten">
        <option value="hamburger">Hamburger</option>
        <option value="hotdog">Hot-dog</option>
        <option value="pizza">Pizza</option>
    </select>
    <br/>
    <label for="favoriet-browser">Favoriete browser: </label>
    <input type="text" id="favoriet-browser" name="favoriet-browser" />
    <br/>
    <br/>
    <label for="password">Wachtwoord*:</label>
    <input type="email" id="password" name="password" required>
    <br/>

    <label for="emailadres">E-mailadres:</label>
    <input type="email" id="emailadres" name="emailadres" placeholder="Geef je e-mailadres in">
    <br/>

    <label for="website">Favoriete site:</label>
    <input type="url" id="website" name="website" placeholder="Geef de URL van je favoriete site">
    <br/>
    <br/>

    <label for="getal1">Favoriete getal tussen 1-10:</label>
    <input type="number" id="getal1" name="getal1" min="1" max="10">
    <br/>

    <label for="getal2">Favoriete getal tussen 11-1000:</label>
    <input type="range" id="getal2" name="getal2" min="11" max="1000">
    <br/>
    <label for="geboorte">Wanneer ben je geboren?</label>
    <input type="date" id="geboorte" name="geboorte">
    <br/>


    <label for="zipcode">Postcode (1000–9992)</label>
    <input
            type="text"
            id="zipcode"
            name="zipcode"
            inputmode="numeric"
            pattern="(1[0-9]{3}|[2-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])"
            title="Geef een geldige Belgische postcode in (1000–9992)."
            required
    >





    <br/>
    <br/>

    <label for="zoeken">Zoeken naar iets:</label>
    <input type="search" id="zoeken" name="zoeken">
    <br/>

    <label for="kleur">Wat is je lievelingskleur?</label>
    <input type="color" id="kleur" name="kleur">
    <br/>

    <label for="bestand">Bestand kiezen:</label>
    <input type="file" id="bestand" name="bestand">

    <br/>

    <input type="submit" value="Submit">


</form>
</body>
</html>
